<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finventory — Dashboard</title>
  <meta name="description" content="Finventory user dashboard with key business metrics." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar">
  <a class="brand" href="dashboard.html">📦 Finventory</a>
  <div class="nav-links">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="inventory.html">Inventory</a>
    <a href="finance.html">Finance</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <h1 class="page-title">Welcome back, <span id="usernameDisplay" style="color:var(--primary)">—</span> 👋</h1>

  <!-- Summary Cards -->
  <div class="cards">
    <div class="card">
      <div class="label">Total Products</div>
      <div class="value blue" id="totalProducts">—</div>
    </div>
    <div class="card">
      <div class="label">Total Income</div>
      <div class="value green" id="totalIncome">—</div>
    </div>
    <div class="card">
      <div class="label">Total Expenses</div>
      <div class="value red" id="totalExpenses">—</div>
    </div>
    <div class="card">
      <div class="label">Net Profit</div>
      <div class="value" id="netProfit">—</div>
    </div>
    <div class="card">
      <div class="label">Low Stock Items</div>
      <div class="value" id="lowStockCount">—</div>
    </div>
    <div class="card">
      <div class="label">Total Invoices</div>
      <div class="value" id="totalInvoices">—</div>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2.5rem;">
    <!-- Recommendations -->
    <div>
      <div class="section-header">
        <h2>💡 AI Recommendations & Alerts</h2>
      </div>
      <div id="recommendations">
        <div class="alert alert-info">
          <span class="spinner" style="width:16px;height:16px;border-width:2px;margin-right:0.25rem"></span> 
          Analyzing your data...
        </div>
      </div>
    </div>

    <!-- Quick Links -->
    <div>
      <div class="section-header"><h2>⚡ Quick Actions</h2></div>
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <a href="inventory.html" class="btn btn-primary" style="justify-content: flex-start; padding: 1rem">
          <span style="font-size: 1.25rem; margin-right: 0.5rem">📦</span> Add New Product
        </a>
        <a href="finance.html" class="btn btn-outline" style="justify-content: flex-start; padding: 1rem; border-color: var(--primary); color: var(--primary)">
          <span style="font-size: 1.25rem; margin-right: 0.5rem">💰</span> Record Transaction
        </a>
        <a href="finance.html" class="btn btn-outline" style="justify-content: flex-start; padding: 1rem">
          <span style="font-size: 1.25rem; margin-right: 0.5rem">🧾</span> View Invoices
        </a>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  if (!checkAuth()) {}
  setActiveNav();
  document.getElementById('usernameDisplay').textContent = getUsername() || 'User';

  async function loadDashboard() {
    try {
      // Products
      const products = await apiFetch(`${INVENTORY_URL}/products`, { headers: authHeaders() });
      if (products) {
        document.getElementById('totalProducts').textContent = products.length;
        const lowStock = products.filter(p => p.stock < 10).length;
        const lowStockEl = document.getElementById('lowStockCount');
        lowStockEl.textContent = lowStock;
        lowStockEl.style.color = lowStock > 0 ? 'var(--warning)' : 'var(--success)';
      }

      // Transactions
      const transactions = await apiFetch(`${FINANCE_URL}/transactions`, { headers: authHeaders() });
      if (transactions) {
        const income   = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
        const expenses = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
        const net = income - expenses;
        document.getElementById('totalIncome').textContent   = fmtMoney(income);
        document.getElementById('totalExpenses').textContent = fmtMoney(expenses);
        const netEl = document.getElementById('netProfit');
        netEl.textContent = fmtMoney(net);
        netEl.style.color = net >= 0 ? 'var(--success)' : 'var(--text)';
      }

      // Invoices
      const invoices = await apiFetch(`${INVOICE_URL}/invoices`, { headers: authHeaders() });
      if (invoices) document.getElementById('totalInvoices').textContent = invoices.length;

      // Recommendations
      const recs = await apiFetch(`${INVOICE_URL}/recommendations`, { headers: authHeaders() });
      if (recs) {
        const typeMap = { low_stock: 'alert-warning', high_expense: 'alert-danger', low_selling: 'alert-info', ok: 'alert-success' };
        
        if (recs.length === 0) {
          document.getElementById('recommendations').innerHTML = '<div class="alert alert-success">✅ All systems look great! No active alerts.</div>';
        } else {
          document.getElementById('recommendations').innerHTML =
            recs.map(r => `<div class="alert ${typeMap[r.type] || 'alert-info'}">${r.message}</div>`).join('');
        }
      }
    } catch (err) {
      console.error(err);
      document.getElementById('recommendations').innerHTML = `<div class="alert alert-danger">Failed to load recommendations.</div>`;
    }
  }

  loadDashboard();
</script>
</body>
</html>
