<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaFlow — Inventory</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="components/tailwind-config.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans flex">

<!-- Layout Injection Points -->
<div id="sidebar-container"></div>

<div class="flex-1 flex flex-col min-w-0 ml-0 sm:ml-64 transition-all duration-300">
  <div id="topbar-container"></div>

  <main class="flex-1 p-6 sm:p-8 max-w-7xl mx-auto w-full">
    
    <!-- Page Header & Actions -->
    <div class="relative w-full h-40 rounded-2xl overflow-hidden mb-6 shadow-sm">
      <img src="https://media.sortly.com/wp-content/uploads/2020/05/12130143/Physical-Inventory.jpg" alt="Inventory Banner" class="w-full h-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-r from-slate-900/80 to-slate-900/20 flex flex-col justify-center px-8">
        <h2 class="text-3xl font-display font-bold text-white mb-2">Inventory</h2>
        <p class="text-white/80 max-w-lg">Manage your products and monitor stock levels.</p>
      </div>
    </div>
    
    <div class="flex justify-end mb-6">
      <button onclick="openProductModal()" class="inline-flex items-center justify-center px-4 py-2.5 text-sm font-medium text-white bg-primary-600 border border-transparent rounded-lg shadow-soft shadow-primary-500/30 hover:bg-primary-700 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 active:scale-[0.98]">
        <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Product
      </button>
    </div>

    <!-- Products Table Card -->
    <div class="bg-white border border-slate-200 shadow-sm rounded-2xl overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
        <h3 class="text-sm font-semibold text-slate-800 uppercase tracking-wider">All Products</h3>
        <span id="productCount" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600">
          Loading...
        </span>
      </div>
      
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200">
          <thead class="bg-white">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Name & Desc</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Price</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Stock Status</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Added</th>
              <th scope="col" class="relative px-6 py-3"><span class="sr-only">Actions</span></th>
            </tr>
          </thead>
          <tbody id="productTableBody" class="bg-white divide-y divide-slate-100">
            <!-- Skeleton Loading State -->
            <tr class="skeleton-row">
              <td><div class="skeleton-box w-3/4"></div><div class="skeleton-box w-1/2 mt-2 h-3"></div></td>
              <td><div class="skeleton-box w-16"></div></td>
              <td><div class="skeleton-box w-20 rounded-full"></div></td>
              <td><div class="skeleton-box w-24"></div></td>
              <td><div class="skeleton-box w-16 float-right"></div></td>
            </tr>
            <tr class="skeleton-row">
              <td><div class="skeleton-box w-2/3"></div><div class="skeleton-box w-1/3 mt-2 h-3"></div></td>
              <td><div class="skeleton-box w-16"></div></td>
              <td><div class="skeleton-box w-20 rounded-full"></div></td>
              <td><div class="skeleton-box w-24"></div></td>
              <td><div class="skeleton-box w-16 float-right"></div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal Overlay -->
<div id="productModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-0 modal-overlay backdrop-blur-sm bg-slate-900/40">
  <!-- Modal Content -->
  <div class="bg-white rounded-2xl shadow-card w-full max-w-lg overflow-hidden modal-content">
    <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
      <h3 id="formTitle" class="text-lg font-display font-semibold text-slate-800">Add New Product</h3>
      <button onclick="closeProductModal()" class="text-slate-400 hover:text-slate-500 transition-colors focus:outline-none p-1 rounded-md hover:bg-slate-100">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    
    <div class="p-6 space-y-5">
      <input type="hidden" id="editId" />
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="pName">Product Name</label>
        <input type="text" id="pName" placeholder="e.g. Mechanical Keyboard" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-sm" />
      </div>
      
      <div class="flex gap-4">
        <div class="flex-1">
          <label class="block text-sm font-medium text-slate-700 mb-1" for="pPrice">Price ($)</label>
          <input type="number" id="pPrice" placeholder="0.00" min="0" step="0.01" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-sm" />
        </div>
        <div class="flex-1">
          <label class="block text-sm font-medium text-slate-700 mb-1" for="pStock">Stock Units</label>
          <input type="number" id="pStock" placeholder="0" min="0" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-sm" />
        </div>
      </div>
      
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1" for="pDesc">Description <span class="text-slate-400 font-normal">(optional)</span></label>
        <textarea id="pDesc" rows="3" placeholder="Enter product details..." class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 transition-all text-sm resize-none"></textarea>
      </div>
      
      <div id="formError" class="text-sm text-red-500 font-medium hidden"></div>
    </div>
    
    <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
      <button onclick="closeProductModal()" class="px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all">
        Cancel
      </button>
      <button id="saveBtn" onclick="saveProduct()" class="px-4 py-2 text-sm font-medium text-white bg-primary-600 border border-transparent rounded-lg shadow-sm hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all flex items-center">
        Save Product
      </button>
    </div>
  </div>
</div>

<script src="app.js?v=3"></script>
<script src="components/layout.js?v=3"></script>
<script src="components/toast.js?v=3"></script>
<script>
  enforceRoleAccess(['user']);
  initLayout('inventory', 'Inventory Management');
  let products = [];

  function openProductModal() {
    resetForm();
    document.getElementById('productModal').classList.add('active');
  }

  function closeProductModal() {
    document.getElementById('productModal').classList.remove('active');
  }

  async function loadProducts() {
    try {
      products = await apiFetch(`${INVENTORY_URL}/products`, { headers: authHeaders() }) || [];
      document.getElementById('productCount').textContent = `${products.length} Items`;
      
      const tbody = document.getElementById('productTableBody');
      if (products.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="px-6 py-12 text-center">
              <svg class="mx-auto h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
              <h3 class="mt-2 text-sm font-medium text-slate-900">No products</h3>
              <p class="mt-1 text-sm text-slate-500">Get started by adding a new product.</p>
              <div class="mt-6">
                <button onclick="openProductModal()" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-primary-600 hover:bg-primary-700 focus:outline-none">
                  <svg class="-ml-1 mr-2 h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
                  New Product
                </button>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = products.map(p => {
        let badgeClass = 'bg-green-100 text-green-800';
        let statusText = `${p.stock} in stock`;
        if (p.stock < 10) { badgeClass = 'bg-red-100 text-red-800'; statusText = `Low stock: ${p.stock}`; }
        else if (p.stock < 30) { badgeClass = 'bg-amber-100 text-amber-800'; statusText = `${p.stock} remaining`; }

        return `
        <tr class="hover:bg-slate-50 transition-colors group">
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="text-sm font-semibold text-slate-900">${p.name}</div>
            <div class="text-xs text-slate-500 truncate max-w-[200px]">${p.description || 'No description'}</div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">
            ${fmtMoney(p.price)}
          </td>
          <td class="px-6 py-4 whitespace-nowrap">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${badgeClass}">
              ${statusText}
            </span>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">
            ${fmtDate(p.created_at)}
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
              <button onclick="editProduct(${p.id})" class="p-1.5 text-slate-400 hover:text-primary-600 hover:bg-primary-50 rounded-lg transition-colors" title="Edit">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
              </button>
              <button onclick="deleteProduct(${p.id})" class="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Delete">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </td>
        </tr>
      `}).join('');
    } catch (err) {
      showToast(err.message, 'error');
      document.getElementById('productTableBody').innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-sm text-red-500 text-center">Failed to load inventory.</td></tr>`;
    }
  }

  async function saveProduct() {
    const errEl = document.getElementById('formError');
    const btn = document.getElementById('saveBtn');
    errEl.classList.add('hidden');
    
    const id    = document.getElementById('editId').value;
    const name  = document.getElementById('pName').value.trim();
    const price = parseFloat(document.getElementById('pPrice').value);
    const stock = parseInt(document.getElementById('pStock').value);
    const desc  = document.getElementById('pDesc').value.trim();

    if (!name || isNaN(price) || isNaN(stock)) { 
      errEl.textContent = 'Name, price, and stock are required.'; 
      errEl.classList.remove('hidden');
      return; 
    }

    const originalText = btn.innerHTML;
    btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Saving...`;
    btn.disabled = true;

    const body = JSON.stringify({ name, price, stock, description: desc || null });
    try {
      if (id) {
        await apiFetch(`${INVENTORY_URL}/products/${id}`, { method: 'PUT', headers: authHeaders(), body });
        showToast('Product updated successfully.', 'success');
      } else {
        await apiFetch(`${INVENTORY_URL}/products`, { method: 'POST', headers: authHeaders(), body });
        showToast('Product added successfully.', 'success');
      }
      closeProductModal();
      loadProducts();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
    } finally {
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  }

  async function deleteProduct(id) {
    if (!confirm('Are you sure you want to delete this product?')) return;
    try {
      await apiFetch(`${INVENTORY_URL}/products/${id}`, { method: 'DELETE', headers: authHeaders() });
      showToast('Product deleted.', 'success');
      loadProducts();
    } catch (err) { showToast(err.message, 'error'); }
  }

  function editProduct(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    document.getElementById('editId').value = p.id;
    document.getElementById('pName').value  = p.name;
    document.getElementById('pPrice').value = p.price;
    document.getElementById('pStock').value = p.stock;
    document.getElementById('pDesc').value  = p.description || '';
    document.getElementById('formTitle').textContent = 'Edit Product';
    document.getElementById('formError').classList.add('hidden');
    document.getElementById('productModal').classList.add('active');
  }

  function resetForm() {
    document.getElementById('editId').value = '';
    document.getElementById('pName').value  = '';
    document.getElementById('pPrice').value = '';
    document.getElementById('pStock').value = '';
    document.getElementById('pDesc').value  = '';
    document.getElementById('formTitle').textContent = 'Add New Product';
    document.getElementById('formError').classList.add('hidden');
  }

  loadProducts();
</script>
</body>
</html>
