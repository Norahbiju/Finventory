<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaFlow — Admin</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="components/tailwind-config.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans flex">

<!-- Layout Injection Points -->
<div id="sidebar-container"></div>

<div class="flex-1 flex flex-col min-w-0 ml-0 sm:ml-64 transition-all duration-300">
  <div id="topbar-container"></div>

  <main class="flex-1 p-6 sm:p-8 max-w-7xl mx-auto w-full">
    
    <!-- Page Header & Actions -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
      <div>
        <h2 class="text-2xl font-display font-bold text-slate-900 tracking-tight">User Management</h2>
        <p class="text-sm text-slate-500 mt-1">Manage system access and team members.</p>
      </div>
    </div>

    <!-- Users Table Card -->
    <div class="bg-white border border-slate-200 shadow-sm rounded-2xl overflow-hidden max-w-4xl">
      <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50/50">
        <h3 class="text-sm font-semibold text-slate-800 uppercase tracking-wider">All Users</h3>
        <span id="userCount" class="text-xs font-medium text-slate-500">Loading...</span>
      </div>
      
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200">
          <thead class="bg-white">
            <tr>
              <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">User ID</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Company Name</th>
              <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Email</th>
            </tr>
          </thead>
          <tbody id="userTableBody" class="bg-white divide-y divide-slate-100">
            <tr class="skeleton-row">
              <td><div class="skeleton-box w-12"></div></td>
              <td><div class="skeleton-box w-32"></div></td>
              <td><div class="skeleton-box w-48"></div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="app.js?v=4"></script>
<script src="components/layout.js?v=4"></script>
<script src="components/toast.js?v=4"></script>
<script>
  enforceRoleAccess(['admin']);
  initLayout('admin', 'Admin Console');

  async function loadUsers() {
    try {
      const users = await apiFetch(`${AUTH_URL}/auth/users`, { headers: authHeaders() }) || [];
      document.getElementById('userCount').textContent = `${users.length} Team Members`;
      
      const tbody = document.getElementById('userTableBody');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-sm text-slate-500">No users found.</td></tr>';
        return;
      }
      
      tbody.innerHTML = users.map(u => {
        return `
        <tr class="hover:bg-slate-50 transition-colors">
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-500">#${u.id}</td>
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="flex items-center">
              <div class="flex-shrink-0 h-8 w-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 font-semibold text-xs border border-slate-200">
                ${u.username.charAt(0).toUpperCase()}
              </div>
              <div class="ml-3">
                <div class="text-sm font-semibold text-slate-900">${u.username}</div>
              </div>
            </div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">
            ${u.email}
          </td>
        </tr>
      `}).join('');
    } catch (err) {
      document.getElementById('userTableBody').innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-sm text-red-500 text-center">Failed to load users.</td></tr>`;
      showToast(err.message, 'error');
    }
  }

  loadUsers();
</script>
</body>
</html>
