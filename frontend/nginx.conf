server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index login.html;

    # Use Docker's built-in DNS — re-resolve every 10 s so restarted
    # containers are picked up without restarting the frontend container.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Reverse proxy: Auth Service (:8001) ───────────────────
    location /api/auth/ {
        set $auth_upstream http://auth_service:8001;
        rewrite ^/api/auth/(.*) /$1 break;
        proxy_pass         $auth_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Reverse proxy: Inventory Service (:8002) ──────────────
    location /api/inventory/ {
        set $inventory_upstream http://inventory_service:8002;
        rewrite ^/api/inventory/(.*) /$1 break;
        proxy_pass         $inventory_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Reverse proxy: Finance Service (:8003) ────────────────
    location /api/finance/ {
        set $finance_upstream http://finance_service:8003;
        rewrite ^/api/finance/(.*) /$1 break;
        proxy_pass         $finance_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Reverse proxy: Invoice Service (:8004) ────────────────
    location /api/invoice/ {
        set $invoice_upstream http://invoice_service:8004;
        rewrite ^/api/invoice/(.*) /$1 break;
        proxy_pass         $invoice_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static frontend files ─────────────────────────────────
    location / {
        try_files $uri $uri/ /login.html;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=3600";
    }
}
