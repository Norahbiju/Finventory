server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index login.html;

    # ── Reverse proxy: Auth Service (:8001) ───────────────────
    location /api/auth/ {
        proxy_pass         http://auth_service:8001/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Reverse proxy: Inventory Service (:8002) ──────────────
    location /api/inventory/ {
        proxy_pass         http://inventory_service:8002/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Reverse proxy: Finance Service (:8003) ────────────────
    location /api/finance/ {
        proxy_pass         http://finance_service:8003/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Reverse proxy: Invoice Service (:8004) ────────────────
    location /api/invoice/ {
        proxy_pass         http://invoice_service:8004/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static frontend files ─────────────────────────────────
    location / {
        try_files $uri $uri/ /login.html;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=3600";
    }
}
