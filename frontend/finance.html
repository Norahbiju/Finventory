<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finventory — Finance</title>
  <meta name="description" content="Track income, expenses, generate invoices, and view recommendations." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar">
  <a class="brand" href="dashboard.html">📦 Finventory</a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="inventory.html">Inventory</a>
    <a href="finance.html" class="active">Finance</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="section-header">
    <h1 class="page-title" style="margin-bottom:0">💰 Finance</h1>
    <button class="btn btn-primary" onclick="openModal('txModal')">+ Record Transaction</button>
  </div>

  <!-- Summary Cards -->
  <div class="cards" style="margin-bottom: 2rem;">
    <div class="card"><div class="label">Total Income</div><div class="value green" id="cardIncome">—</div></div>
    <div class="card"><div class="label">Total Expenses</div><div class="value red" id="cardExpense">—</div></div>
    <div class="card"><div class="label">Net Profit</div><div class="value" id="cardNet">—</div></div>
    <div class="card"><div class="label">Transactions</div><div class="value blue" id="cardCount">—</div></div>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:0.75rem;margin-bottom:1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">
    <button class="btn btn-primary" id="tabTx" onclick="showTab('tx')">Transactions</button>
    <button class="btn btn-outline" id="tabInv" onclick="showTab('inv')">Invoices</button>
  </div>

  <!-- Transactions Tab -->
  <div id="tab-tx">
    <div class="section-header">
      <h2>Transaction History</h2>
      <span id="txCount" style="font-size:0.85rem;color:var(--muted)"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>Type</th><th>Category</th><th>Amount</th><th>Description</th><th>Product</th><th>Qty</th><th>Date</th><th>Action</th></tr>
        </thead>
        <tbody id="txTableBody"><tr><td colspan="9" class="empty"><span class="spinner"></span></td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Invoices Tab -->
  <div id="tab-inv" style="display:none">
    <div class="section-header">
      <h2>Generated Invoices</h2>
      <span id="invCount" style="font-size:0.85rem;color:var(--muted)"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>ID</th><th>Ref TX</th><th>Product</th><th>Qty</th><th>Unit Price</th><th>Total</th><th>Date</th></tr>
        </thead>
        <tbody id="invTableBody"><tr><td colspan="7" class="empty"><span class="spinner"></span></td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal: Record Transaction -->
<div class="modal-overlay" id="txModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Record Transaction</h3>
      <button class="modal-close" onclick="closeModal('txModal')">&times;</button>
    </div>
    
    <div style="display: flex; gap: 1rem;">
      <div class="form-group" style="flex:1">
        <label for="txType">Type</label>
        <select id="txType" onchange="onTypeChange()">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <div class="form-group" style="flex:1">
        <label for="txCategory">Category</label>
        <select id="txCategory" onchange="onTypeChange()">
          <option value="sale">Sale</option>
          <option value="purchase">Purchase</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    
    <div class="form-group">
      <label for="txAmount">Amount ($)</label>
      <input type="number" id="txAmount" placeholder="0.00" min="0" step="0.01" />
    </div>
    
    <div style="display: flex; gap: 1rem;">
      <div class="form-group" id="productGroup" style="flex:2">
        <label for="txProduct">Product (for sales)</label>
        <select id="txProduct">
          <option value="">— Select product —</option>
        </select>
      </div>
      <div class="form-group" id="qtyGroup" style="flex:1">
        <label for="txQty">Quantity</label>
        <input type="number" id="txQty" placeholder="1" min="1" />
      </div>
    </div>
    
    <div class="form-group">
      <label for="txDesc">Description</label>
      <input type="text" id="txDesc" placeholder="Optional note" />
    </div>
    
    <div id="txError" class="error-msg" style="text-align:left; margin-bottom:1rem"></div>
    
    <div style="display:flex; justify-content:flex-end; gap:0.5rem">
      <button class="btn btn-outline" onclick="closeModal('txModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addTransaction()">Record Transaction</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  if (!checkAuth()) {}
  setActiveNav();

  let transactions = [];

  function showTab(tab) {
    ['tx', 'inv'].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
      document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`).className =
        t === tab ? 'btn btn-primary' : 'btn btn-outline';
    });
    if (tab === 'inv') loadInvoices();
  }

  function onTypeChange() {
    const isSale = document.getElementById('txCategory').value === 'sale';
    document.getElementById('productGroup').style.display = isSale ? '' : 'none';
    document.getElementById('qtyGroup').style.display     = isSale ? '' : 'none';
  }
  document.getElementById('txCategory').addEventListener('change', onTypeChange);
  onTypeChange();

  async function loadProductOptions() {
    try {
      const products = await apiFetch(`${INVENTORY_URL}/products`, { headers: authHeaders() });
      if (!products) return;
      const sel = document.getElementById('txProduct');
      sel.innerHTML = '<option value="">— Select product —</option>' +
        products.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name} (Stock: ${p.stock})</option>`).join('');
      sel.addEventListener('change', () => {
        const opt = sel.options[sel.selectedIndex];
        if (opt.dataset.price) document.getElementById('txAmount').value = opt.dataset.price;
      });
    } catch (e) { console.error(e); }
  }

  async function loadTransactions() {
    try {
      transactions = await apiFetch(`${FINANCE_URL}/transactions`, { headers: authHeaders() }) || [];
      const income   = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const expenses = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const net = income - expenses;
      document.getElementById('cardIncome').textContent  = fmtMoney(income);
      document.getElementById('cardExpense').textContent = fmtMoney(expenses);
      document.getElementById('cardCount').textContent   = transactions.length;
      const netEl = document.getElementById('cardNet');
      netEl.textContent = fmtMoney(net);
      netEl.style.color = net >= 0 ? 'var(--success)' : 'var(--text)';
      document.getElementById('txCount').textContent = `${transactions.length} record(s)`;

      const tbody = document.getElementById('txTableBody');
      if (transactions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">No transactions yet.</td></tr>';
        return;
      }
      tbody.innerHTML = transactions.map(t => `
        <tr>
          <td style="color:var(--muted)">#${t.id}</td>
          <td><span class="badge ${t.type === 'income' ? 'badge-green' : 'badge-red'}">${t.type}</span></td>
          <td style="text-transform:capitalize">${t.category}</td>
          <td style="font-weight:600">${fmtMoney(t.amount)}</td>
          <td style="color:var(--muted)">${t.description || '—'}</td>
          <td style="color:var(--muted)">${t.product_id ? `Prod #${t.product_id}` : '—'}</td>
          <td style="color:var(--muted)">${t.quantity || '—'}</td>
          <td style="color:var(--muted)">${fmtDate(t.created_at)}</td>
          <td>
            ${t.category === 'sale' && t.product_id ?
              `<button class="btn btn-outline btn-sm" onclick="generateInvoice(${t.id}, ${t.product_id}, ${t.amount}, ${t.quantity || 1})">Invoice</button>` :
              '—'}
          </td>
        </tr>
      `).join('');
    } catch (err) {
      document.getElementById('txTableBody').innerHTML =
        `<tr><td colspan="9" class="empty" style="color:var(--danger)">${err.message}</td></tr>`;
    }
  }

  async function addTransaction() {
    const errEl    = document.getElementById('txError');
    errEl.textContent = '';
    const type     = document.getElementById('txType').value;
    const category = document.getElementById('txCategory').value;
    const amount   = parseFloat(document.getElementById('txAmount').value);
    const desc     = document.getElementById('txDesc').value.trim();
    const productId= parseInt(document.getElementById('txProduct').value) || null;
    const qty      = parseInt(document.getElementById('txQty').value) || null;

    if (isNaN(amount) || amount <= 0) { errEl.textContent = 'Please enter a valid amount.'; return; }
    if (category === 'sale' && !productId) { errEl.textContent = 'Please select a product for a sale.'; return; }

    const body = JSON.stringify({ type, category, amount, description: desc || null, product_id: productId, quantity: qty });
    try {
      await apiFetch(`${FINANCE_URL}/transactions`, { method: 'POST', headers: authHeaders(), body });
      
      // Reset form
      document.getElementById('txAmount').value = '';
      document.getElementById('txDesc').value   = '';
      document.getElementById('txProduct').value = '';
      document.getElementById('txQty').value    = '';
      
      closeModal('txModal');
      loadTransactions();
      loadProductOptions(); // refresh stock counts
    } catch (err) {
      errEl.textContent = err.message;
    }
  }

  async function generateInvoice(txId, productId, amount, qty) {
    const productName = prompt('Enter product name for invoice:', '');
    if (!productName) return;
    const unitPrice = qty > 0 ? amount / qty : amount;
    try {
      await apiFetch(`${INVOICE_URL}/invoices/generate`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ transaction_id: txId, product_name: productName, quantity: qty, unit_price: unitPrice }),
      });
      alert('✅ Invoice generated! Check the Invoices tab.');
      showTab('inv');
    } catch (err) { alert(err.message); }
  }

  async function loadInvoices() {
    try {
      const invoices = await apiFetch(`${INVOICE_URL}/invoices`, { headers: authHeaders() }) || [];
      document.getElementById('invCount').textContent = `${invoices.length} invoice(s)`;
      const tbody = document.getElementById('invTableBody');
      if (invoices.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">No invoices yet.</td></tr>';
        return;
      }
      tbody.innerHTML = invoices.map(inv => `
        <tr>
          <td style="color:var(--muted)">#${inv.id}</td>
          <td>TX-${inv.transaction_id}</td>
          <td><strong>${inv.product_name}</strong></td>
          <td>${inv.quantity}</td>
          <td style="color:var(--muted)">${fmtMoney(inv.unit_price)}</td>
          <td style="font-weight:600">${fmtMoney(inv.total)}</td>
          <td style="color:var(--muted)">${fmtDate(inv.created_at)}</td>
        </tr>
      `).join('');
    } catch (err) {
      document.getElementById('invTableBody').innerHTML =
        `<tr><td colspan="7" class="empty" style="color:var(--danger)">${err.message}</td></tr>`;
    }
  }

  loadTransactions();
  loadProductOptions();
</script>
</body>
</html>
